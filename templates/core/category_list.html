{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <base href="{% static 'organic/' %}">
    <meta charset="utf-8">
    <title>Categories</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="custom.css">
  </head>
  <body>
    {% include 'core/sidebar.html' %}
    <div class="container mt-4">
      <h1>Categories</h1>
      <div class="row">
        {% for cat in categories %}
          <div class="col-md-4 mb-3">
            <div class="card">
              {% if cat.image %}
                <img src="{{ cat.image.url }}" class="card-img-top" alt="{{ cat.name }}">
              {% endif %}
              <div class="card-body">
                <h5 class="card-title"><a href="{% url 'core:category_detail' slug=cat.slug %}">{{ cat.name }}</a></h5>
                <p class="card-text">{{ cat.description|truncatewords:25 }}</p>
              </div>
            </div>
          </div>
        {% empty %}
          <p>No categories yet.</p>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
