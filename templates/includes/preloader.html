<!-- templates/includes/preloader.html -->
<style>
    #preloader {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: #ffffff;
        z-index: 99999;
        display: flex; justify-content: center; align-items: center;
    }
    .spinner {
        width: 50px; height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

<div id="preloader">
    <div class="spinner"></div>
</div>

<script>
    // Skrypt odpali się natychmiast po przeczytaniu drzewa HTML przez przeglądarkę,
    // całkowicie ignorując ewentualne błędy i zawieszenia w jquery/plugins.js
    document.addEventListener('DOMContentLoaded', function () {
        var preloader = document.getElementById('preloader');
        var mainContent = document.getElementById('main-content');

        if (preloader) { preloader.style.display = 'none'; }
        if (mainContent) {
            mainContent.style.visibility = 'visible';
            mainContent.style.opacity = '1';
        }
    });

    // Zabezpieczenie na wypadek awarii (np. starszych przeglądarek) - po 2 sekundach zawsze pokaż stronę
    setTimeout(function() {
        var preloader = document.getElementById('preloader');
        var mainContent = document.getElementById('main-content');
        if (preloader) { preloader.style.display = 'none'; }
        if (mainContent) {
            mainContent.style.visibility = 'visible';
            mainContent.style.opacity = '1';
        }
    }, 2000);
</script>
