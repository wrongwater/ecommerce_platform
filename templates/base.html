{% include "partials/header.html" %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Organic Shop{% endblock %}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'organic/css/vendor.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'organic/style.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'organic/custom.css' %}">
  </head>
  <body>
    {% comment %} persistent sidebar included site-wide {% endcomment %}
    {% include 'core/sidebar.html' %}

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
